name: Yoi Auto Update

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch: 

jobs:
  update-playlist:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies (Python + Node.js)
        run: |
          sudo apt-get update
          sudo apt-get install -y nodejs
          python -m pip install --upgrade pip
          pip install yt-dlp requests

      # --- NEW: CLOUDFLARE WARP PROXY TUNNEL ---
      - name: Install and Boot Cloudflare WARP
        run: |
          # Add Cloudflare's official repository
          curl -fsSL https://pkg.cloudflareclient.com/pubkey.gpg | sudo gpg --yes --dearmor --output /usr/share/keyrings/cloudflare-warp-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/cloudflare-warp-archive-keyring.gpg] https://pkg.cloudflareclient.com/ $(lsb_release -cs) main" | sudo tee /etc/apt/sources.list.d/cloudflare-client.list
          sudo apt-get update
          sudo apt-get install -y cloudflare-warp
          
          # Register and boot the local proxy tunnel
          warp-cli --accept-tos registration new
          warp-cli --accept-tos mode proxy
          warp-cli --accept-tos connect
          
          echo "Waiting 5 seconds for WARP to establish a connection..."
          sleep 5

      - name: Create Cookies File
        run: |
          echo "${{ secrets.YOUTUBE_COOKIES }}" > cookies.txt

      - name: Run Smart Extraction Script
        env:
          # Pointing the script locally to the new WARP tunnel
          PROXY_1: "socks5://127.0.0.1:40000"
          # Keeping Webshare as a backup just in case
          PROXY_2: ${{ secrets.PROXY_1 }} 
          PROXY_3: ${{ secrets.PROXY_2 }}
        run: python update.py

      - name: Commit and Push Changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add live.m3u8
          git commit -m "Auto-update channels via Cloudflare WARP" || exit 0
          git push

name: Yoi Auto Update

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch: 

jobs:
  update-playlist:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yt-dlp requests

      - name: Create Cookies File
        run: |
          echo "${{ secrets.YOUTUBE_COOKIES }}" > cookies.txt

      - name: Run Extraction Script
        env:
          PROXY_1: ${{ secrets.PROXY_1 }}
          PROXY_2: ${{ secrets.PROXY_2 }}
          PROXY_3: ${{ secrets.PROXY_3 }}
          PROXY_4: ${{ secrets.PROXY_4 }}
          PROXY_5: ${{ secrets.PROXY_5 }}
          # Keeping the legacy backup just in case
          BACKUP_PROXY_URL: ${{ secrets.BACKUP_PROXY_URL }}
        run: python update.py

      - name: Commit and Push Changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add live.m3u8
          git commit -m "Auto-update channels via Webshare Multi-Pool" || exit 0
          git push

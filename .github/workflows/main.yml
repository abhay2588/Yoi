name: Auto-Update YouTube M3U8

on:
  schedule:
    - cron: "0 */3 * * *" 
  workflow_dispatch: 

jobs:
  update-stream:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write 

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Installs Node.js to fix the JS runtime warning
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install yt-dlp
        run: pip install yt-dlp

      # Grabs your secure secret and creates the cookies.txt file for yt-dlp to read
      - name: Create Cookies File
        run: echo "${{ secrets.YOUTUBE_COOKIES }}" > cookies.txt

      - name: Run the Python Script
        run: python update.py

      # Clean up the cookies file so it doesn't accidentally get committed to your repo
      - name: Delete Cookies File
        run: rm cookies.txt

      - name: Save and Push the New Token
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add live.m3u8
          git diff --quiet && git diff --staged --quiet || (git commit -m "Refresh stream token" && git push)

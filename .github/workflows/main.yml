name: Yoi Auto Update

on:
  schedule:
    # Runs every 6 hours (4 times a day) to balance YouTube expiry and Webshare data
    - cron: "0 */8 * * *"
  workflow_dispatch: # Allows manual triggering from the Actions tab

jobs:
  update-playlist:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yt-dlp requests

      - name: Create Cookies File
        run: |
          echo "${{ secrets.YOUTUBE_COOKIES }}" > cookies.txt

      - name: Run Smart Extraction Script
        env:
          # Injects your Webshare proxy securely into the Python script
          BACKUP_PROXY_URL: ${{ secrets.BACKUP_PROXY_URL }}
        run: python update.py

      - name: Commit and Push Changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add live.m3u8
          # The || exit 0 prevents workflow failure if cache caught everything and no links changed
          git commit -m "Auto-update channels via Webshare Smart Cache" || exit 0
          git push

name: Auto-Update YouTube M3U8

on:
  schedule:
    - cron: "0 */3 * * *" 
  workflow_dispatch: 

jobs:
  update-stream:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write 

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Install Deno, the default JS engine required by yt-dlp
      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install yt-dlp
        run: pip install yt-dlp

      - name: Create Cookies File
        run: echo "${{ secrets.YOUTUBE_COOKIES }}" > cookies.txt

      - name: Run the Python Script
        run: python update.py

      - name: Delete Cookies File
        run: rm cookies.txt

      - name: Save and Push the New Token
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add live.m3u8
          git diff --quiet && git diff --staged --quiet || (git commit -m "Refresh stream token" && git push)

name: Auto-Update YouTube M3U8

on:
  schedule:
    - cron: "0 */4 * * *" 
  workflow_dispatch: 

jobs:
  update-stream:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write 

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install yt-dlp
          pip install requests

      - name: Create Cookies File
        run: echo "${{ secrets.YOUTUBE_COOKIES }}" > cookies.txt

      - name: Run the Python Script
        env:
          PROXY_URL: ${{ secrets.PROXY_URL }}
          # Injects your new backup proxy
          BACKUP_PROXY_URL: ${{ secrets.BACKUP_PROXY_URL }}
        run: python update.py

      - name: Cleanup Cookies
        run: rm -f cookies.txt

      - name: Save and Push the New Token
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add live.m3u8
          git diff --quiet && git diff --staged --quiet || (git commit -m "Refresh stream token via Webshare" && git push)

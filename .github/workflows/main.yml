name: Auto-Update YouTube M3U8

on:
  schedule:
    - cron: "0 */4 * * *" 
  workflow_dispatch: 

jobs:
  update-stream:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write 

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install yt-dlp
          pip install requests

      - name: Setup Xray Engine for Proxy
        env:
          # Pulls the JSON safely into the environment first to protect quotes
          XRAY_CONFIG: ${{ secrets.VMESS_JSON_CONFIG }}
        run: |
          wget https://github.com/XTLS/Xray-core/releases/latest/download/Xray-linux-64.zip
          unzip Xray-linux-64.zip -d xray
          echo "$XRAY_CONFIG" > xray/config.json
          ./xray/xray run -c xray/config.json &
          sleep 5

      - name: Create Cookies File
        run: echo "${{ secrets.YOUTUBE_COOKIES }}" > cookies.txt

      - name: Run the Python Script
        env:
          PROXY_URL: "socks5://127.0.0.1:10808"
        run: python update.py

      - name: Cleanup (Kill Proxy and Cookies)
        run: |
          pkill xray || true
          rm -f cookies.txt

      - name: Save and Push the New Token
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add live.m3u8
          git diff --quiet && git diff --staged --quiet || (git commit -m "Refresh stream token via Xray Tunnel" && git push)

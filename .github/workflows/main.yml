name: Yoi Auto Update

on:
  schedule:
    # Runs every 8 hours to maximize your 5-proxy pool lifespan
    - cron: "0 */6 * * *"
  workflow_dispatch: 

jobs:
  update-playlist:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies (Python + Node.js)
        run: |
          # --- THE FIX: Installs Node.js so yt-dlp can solve YouTube's JS puzzle ---
          sudo apt-get update
          sudo apt-get install -y nodejs
          
          python -m pip install --upgrade pip
          pip install yt-dlp requests

      - name: Create Cookies File
        run: |
          echo "${{ secrets.YOUTUBE_COOKIES }}" > cookies.txt

      - name: Run Smart Extraction Script
        env:
          # Injects your 5-proxy waterfall pool
          PROXY_1: ${{ secrets.PROXY_1 }}
          PROXY_2: ${{ secrets.PROXY_2 }}
          PROXY_3: ${{ secrets.PROXY_3 }}
          PROXY_4: ${{ secrets.PROXY_4 }}
          PROXY_5: ${{ secrets.PROXY_5 }}
          BACKUP_PROXY_URL: ${{ secrets.BACKUP_PROXY_URL }}
        run: python update.py

      - name: Commit and Push Changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add live.m3u8
          git commit -m "Auto-update channels with JS Challenge Solver" || exit 0
          git push

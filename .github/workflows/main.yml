- name: Boot Indian VMESS Node (With Kill Switch)
        env:
          VMESS_LINK: ${{ secrets.INDIAN_VMESS_LINK }}
        run: |
          # 1. Download Xray-core
          wget -qO xray.zip https://github.com/XTLS/Xray-core/releases/latest/download/Xray-linux-64.zip
          unzip -q xray.zip -d xray-core
          chmod +x xray-core/xray
          
          # 2. Translate vmess:// link to config.json
          python -c "
          import os, json, base64
          link = os.environ.get('VMESS_LINK', '').replace('vmess://', '')
          if not link: exit(0)
          # Fix base64 padding
          link += '=' * (-len(link) % 4)
          v = json.loads(base64.b64decode(link).decode('utf-8'))
          
          # Build standard Xray config
          config = {
              'inbounds': [{'port': 10808, 'listen': '127.0.0.1', 'protocol': 'socks', 'settings': {'udp': True}}],
              'outbounds': [{'protocol': 'vmess', 'settings': {'vnext': [{'address': v.get('add'), 'port': int(v.get('port')), 'users': [{'id': v.get('id'), 'alterId': int(v.get('aid', 0))}]}]}, 'streamSettings': {'network': v.get('net', 'tcp'), 'security': v.get('tls', 'none')}}]
          }
          
          # Add WebSocket settings if required by the link
          if v.get('net') == 'ws':
              config['outbounds'][0]['streamSettings']['wsSettings'] = {'path': v.get('path', '/'), 'headers': {'Host': v.get('host', '')}}
              
          with open('config.json', 'w') as f: json.dump(config, f)
          "
          
          # 3. Start the Engine with the 120-second Kill Switch
          if [ -f config.json ]; then
            timeout 120s ./xray-core/xray run -c config.json &
            sleep 5 # Give it 5 seconds to establish the connection
            echo "Indian VMESS Node successfully booted on 127.0.0.1:10808"
          else
            echo "Failed to generate config. Continuing without VMESS."
          fi

      - name: Run Extraction Script
        env:
          PROXY_URL: "socks5://127.0.0.1:10808"
          BACKUP_PROXY_URL: ${{ secrets.BACKUP_PROXY_URL }} # Keeps your Webshare proxy as a backup!
        run: python update.py

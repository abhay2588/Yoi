name: Yoi Auto Update

on:
  schedule:
    # The 6-hour sweet spot: Matches YouTube's token expiry to keep streams alive
    - cron: "0 */6 * * *"
  workflow_dispatch: # Allows you to manually click "Run workflow" for instant testing

jobs:
  update-playlist:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      # --- THE GHOST PROTOCOL: BOOTING TOR ---
      - name: Install and Start Tor
        run: |
          sudo apt-get update
          sudo apt-get install -y tor
          sudo service tor start
          echo "Waiting 15 seconds for Tor to establish a secure circuit..."
          sleep 15

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yt-dlp requests

      - name: Run Smart Extraction Script
        run: python update.py

      - name: Commit and Push Changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add live.m3u8
          # The || exit 0 prevents the workflow from failing if no links changed
          git commit -m "Auto-update channels via Tor Network" || exit 0
          git push
